type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Row-shape scan experiment: single TEXT payload column (~1024 B), 10000000 rows. lookup_key is unique in data but has NO index (point lookup via seq scan); id is PK (idx point lookup). Scan mode: seq.
        create:
            - DROP TABLE IF EXISTS THRPT_RS_PG1_1kb_10m_seq;
            - CREATE TABLE THRPT_RS_PG1_1kb_10m_seq (id INT, lookup_key INT, payload TEXT, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_RS_PG1_1kb_10m_seq;

        loadRules:
            - table: THRPT_RS_PG1_1kb_10m_seq
              rows: 10000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: lookup_key
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_RS_PG1_1kb_10m_seq
              run:
                  - name: THRPT_RS_PG1_1kb_10m_seq
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_RS_PG1_1kb_10m_seq WHERE lookup_key = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 10000000]
