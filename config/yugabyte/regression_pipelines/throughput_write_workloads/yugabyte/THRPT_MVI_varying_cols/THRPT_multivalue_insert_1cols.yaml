type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 1
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
targetCPU: 75
toleranceCPU: 5
optimalThreads: true
samplingTime: 120
time: 600
useThroughputThreshold: true
truncateBetweenIterations: true
scalingMinDeltaPercent: 3
restingTimeSecs: 180
works:
    work:
        time_secs: 180
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_MVI_1_col;
            - CREATE TABLE THRPT_MVI_1_col (dept_id INT, emp_id INT, payload TEXT, primary key(dept_id asc, emp_id asc)) SPLIT AT VALUES ((4), (7));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_MVI_1_col;
        
        iterativeCleanup:
            - DROP TABLE IF EXISTS THRPT_MVI_1_col;
            - CREATE TABLE THRPT_MVI_1_col (dept_id INT, emp_id INT, payload TEXT, primary key(dept_id asc, emp_id asc)) SPLIT AT VALUES ((4), (7));

        loadRules:
            - table: THRPT_MVI_1_col
              rows: 1000000
              columns:
                  - name: dept_id
                    util: RandomUniqueCyclicIntGen
                    params: [1,9,1]
                  - name: emp_id
                    util: PrimaryIntGenThroughput
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1000, 1000]

        executeRules:
            - workload: THRPT_multivalue_insert_1cols
              run:
                  - name: THRPT_multivalue_insert_1cols
                    weight: 100
                    queries:
                        - query: INSERT INTO THRPT_MVI_1_col VALUES [(?,?,?)][pattern_count]
                          pattern_count: 10
                          bindings:
                              - util: RandomUniqueCyclicIntGen
                                params: [1,9,1]
                              - util: PrimaryIntGenThroughput
                                params: [1000001, 10000000000]
                              - util: RandomAString
                                params: [1000, 1000]