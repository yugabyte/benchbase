type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Single LARGE column (~10KB TEXT) per row. PG variant of T17.
        create:
            - DROP TABLE IF EXISTS THRPT_T17_blobs;
            - CREATE TABLE THRPT_T17_blobs (id INT, big_data TEXT, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T17_blobs;

        loadRules:
            - table: THRPT_T17_blobs
              rows: 100000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: big_data
                    util: RandomAString
                    params: [10000, 10000]

        executeRules:
            - workload: THRPT_T17_single_large_col
              run:
                  - name: THRPT_T17_single_large_col
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T17_blobs WHERE id = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 100000]
