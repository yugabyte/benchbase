type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{ username }}
password: {{ password }}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G8_employees;
            - CREATE TABLE THRPT_G8_employees (emp_id INT, name VARCHAR(10), email VARCHAR(20), salary FLOAT, hire_date DATE, department VARCHAR(20), payload JSON, details TEXT, is_active BOOLEAN, last_login TIMESTAMP, primary key(emp_id asc)) SPLIT AT VALUES ((333333), (666666));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_G8_employees;

        loadRules:
            - table: THRPT_G8_employees
              rows: 1000000
              columns:
                  - name: emp_id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: name
                    util: RandomAString
                    params: [10, 10]
                  - name: email
                    util: RandomAString
                    params: [20, 20]
                  - name: salary
                    util: RandomNoWithDecimalPoints
                    params: [1, 100000, 2]
                  - name: hire_date
                    util: RandomDateBtwYears
                    params: [2000, 2025]
                  - name: department
                    util: OneStringFromArray
                    params: [['Engineering', 'Sales', 'Marketing', 'Finance', 'IT', 'HR', 'Legal', 'Product']]
                  - name: payload
                    util: RandomJson
                    params: [8, 64]
                  - name: details
                    util: RandomAString
                    params: [512, 512]
                  - name: is_active
                    util: RandomBoolean
                  - name: last_login
                    util: RandomTimestamp
                    params: [10000000]

        executeRules:
            - workload: THRPT_G8_aggregate_pushdown
              run:
                  - name: THRPT_G8_aggregate_pushdown
                    weight: 100
                    queries:
                        - query: select sum(salary) from THRPT_G8_employees where department IN (?,?);
                          bindings:
                              - util: OneStringFromArray
                                count: 2
                                params: [['Engineering', 'Sales','Marketing','Finance','IT','HR','Legal','Product']]