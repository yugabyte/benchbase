type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: false
        create:
            - DROP TABLE IF EXISTS THRPT_10_MVI_1col;
            - CREATE TABLE THRPT_10_MVI_1col (dept_id INT, emp_id INT, payload TEXT, primary key(dept_id, emp_id));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_10_MVI_1col;

        loadRules:
            - table: THRPT_10_MVI_1col
              rows: 1000000
              columns:
                  - name: dept_id
                    util: RandomUniqueCyclicIntGenWithPeriod
                    params: [1,9,1]
                  - name: emp_id
                    util: PrimaryIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1000, 1000]

        executeRules:
            - workload: THRPT_10_MVI_1col
              run:
                  - name: THRPT_10_MVI_1col
                    weight: 100
                    queries:
                        - query: INSERT INTO THRPT_10_MVI_1col VALUES [(?,?,?)][pattern_count]
                          pattern_count: 10
                          bindings:
                              - util: RandomUniqueCyclicIntGenWithPeriod
                                params: [1,9,1]
                              - util: PrimaryIntGen
                                params: [1000001, 2147483646]
                              - util: RandomAString
                                params: [1000, 1000]