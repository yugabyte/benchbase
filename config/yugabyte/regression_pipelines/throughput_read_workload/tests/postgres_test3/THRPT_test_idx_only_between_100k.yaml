type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_WL_IDX_ONLY_BETWEEN_100K;
            - CREATE TABLE THRPT_WL_IDX_ONLY_BETWEEN_100K (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id));
            - CREATE INDEX idx_c1_cover ON THRPT_WL_IDX_ONLY_BETWEEN_100K (c1) INCLUDE (id);

        cleanup:
            - DROP TABLE IF EXISTS THRPT_WL_IDX_ONLY_BETWEEN_100K;

        loadRules:
            - table: THRPT_WL_IDX_ONLY_BETWEEN_100K
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_WL_idx_only_between_100k
              run:
                  - name: THRPT_WL_idx_only_between_100k
                    weight: 100
                    queries:
                        - query: SELECT c1, id FROM THRPT_WL_IDX_ONLY_BETWEEN_100K WHERE c1 BETWEEN ? AND ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 900000]
                                referenceName: c1
                              - util: ExpressionEval
                                params:
                                    - "c1 + 100000"