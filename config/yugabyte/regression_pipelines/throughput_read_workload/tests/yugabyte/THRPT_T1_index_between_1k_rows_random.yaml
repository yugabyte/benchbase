type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Range index scan returning ~1k rows in random PK order using BETWEEN.
        # 1M rows, region_id has 5000 distinct values uniformly distributed (~200 rows per value).
        # BETWEEN x AND x+4 covers 5 distinct values -> ~1000 matching rows.
        # PK is range-sharded ASC; rows with the same region_id are scattered across the PK
        # space, so the index->table fetch hits random PK locations (random order).
        create:
            - DROP TABLE IF EXISTS THRPT_T1_orders;
            - CREATE TABLE THRPT_T1_orders(id INT, region_id INT, category_id INT, amount INT, quantity INT, status_code INT, PRIMARY KEY(id ASC)) SPLIT AT VALUES ((333333), (666666));
            - CREATE INDEX idx_THRPT_T1_orders_region ON THRPT_T1_orders (region_id ASC, id ASC) SPLIT AT VALUES ((1666), (3333));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T1_orders;

        loadRules:
            - table: THRPT_T1_orders
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: region_id
                    util: RandomNumber
                    params: [1, 5000]
                  - name: category_id
                    util: RandomNumber
                    params: [1, 50]
                  - name: amount
                    util: RandomNumber
                    params: [1, 100000]
                  - name: quantity
                    util: RandomNumber
                    params: [1, 100000]
                  - name: status_code
                    util: RandomNumber
                    params: [1, 5]

        executeRules:
            - workload: THRPT_T1_index_between_1k_rows_random
              run:
                  - name: THRPT_T1_index_between_1k_rows_random
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T1_orders WHERE region_id BETWEEN ? AND ?;
                          bindings:
                              -   util: RandomNumber
                                  params: [1, 4995]
                                  referenceName: r1
                              -   util: ExpressionEval
                                  params:
                                      - "r1 + 4"
