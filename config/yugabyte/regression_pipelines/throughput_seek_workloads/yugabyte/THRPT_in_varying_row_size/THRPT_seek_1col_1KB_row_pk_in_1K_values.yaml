type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 1
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_in_1kb_row;
            - CREATE TABLE THRPT_in_1kb_row (id INT, lookup_key INT, payload TEXT, PRIMARY KEY(id asc)) SPLIT AT VALUES ((3333333), (6666666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_in_1kb_row;

        loadRules:
            - table: THRPT_in_1kb_row
              rows: 10000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: lookup_key
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_seek_1col_1KB_row_pk_in_1K_values
              run:
                  - name: THRPT_seek_1col_1KB_row_pk_in_1K_values
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_in_1kb_row WHERE id IN (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?);
                          bindings:
                              - util: RandomNumber
                                count: 100
                                params: [1, 10000000]