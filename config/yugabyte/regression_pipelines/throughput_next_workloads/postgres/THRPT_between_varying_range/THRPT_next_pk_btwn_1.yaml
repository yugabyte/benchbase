type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_between_range_1;
            - ALTER DATABASE postgres SET enable_seqscan=off;
            - ALTER DATABASE postgres SET enable_bitmapscan=off;
            - CREATE TABLE THRPT_between_range_1 (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_between_range_1;
            - ALTER DATABASE postgres SET enable_seqscan TO DEFAULT;
            - ALTER DATABASE postgres SET enable_bitmapscan TO DEFAULT;

        loadRules:
            - table: THRPT_between_range_1
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_next_pk_btwn_1
              run:
                  - name: THRPT_next_pk_btwn_1
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_between_range_1 WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 999999]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 1"