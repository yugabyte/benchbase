type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Single LARGE column (~10MB TEXT) per row. Pair with T18 to compare:
        # one big column vs many small columns of the same total payload size.
        # Tests per-column encode/decode and TOAST/extstore overhead.
        create:
            - DROP TABLE IF EXISTS THRPT_T17_blobs;
            - CREATE TABLE THRPT_T17_blobs (id INT, big_data TEXT, PRIMARY KEY(id ASC)) SPLIT AT VALUES ((3333), (6666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T17_blobs;

        loadRules:
            - table: THRPT_T17_blobs
              rows: 10000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000]
                  - name: big_data
                    util: RandomAString
                    params: [1000000, 1000000]

        executeRules:
            - workload: THRPT_T17_single_large_col
              run:
                  - name: THRPT_T17_single_large_col
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T17_blobs WHERE id = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 10000]
