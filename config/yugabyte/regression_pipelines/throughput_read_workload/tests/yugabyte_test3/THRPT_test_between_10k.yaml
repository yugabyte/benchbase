type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_WL_BETWEEN_10K;
            - CREATE TABLE THRPT_WL_BETWEEN_10K (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id asc)) split at values ((3333333), (6666666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_WL_BETWEEN_10K;

        loadRules:
            - table: THRPT_WL_BETWEEN_10K
              rows: 10000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_WL_between_10k
              run:
                  - name: THRPT_WL_between_10k
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_WL_BETWEEN_10K WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 9990000]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 10000"