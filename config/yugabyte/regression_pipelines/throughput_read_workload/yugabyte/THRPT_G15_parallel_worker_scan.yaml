type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{ username }}
password: {{ password }}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G15_events;
            - CREATE TABLE THRPT_G15_events (id bigserial PRIMARY KEY, user_id int , event_type text , payload text, created_at timestamptz);
        cleanup:
            - DROP TABLE IF EXISTS THRPT_G15_events;

        loadRules:
            - table: THRPT_G15_events
              rows: 1000000
              columns:
                  - name: id
                    util: PrimaryIntGen
                    params: [1, 1000000]
                  - name: user_id
                    util: CyclicSeqIntGen
                    params: [1, 250000]
                  - name: event_type
                    util: OneStringFromArray
                    params: ["purchase", "view", "add_to_cart", "checkout", "purchase_failed", "signup", "login", "logout", "delete_account", "update_profile"]
                  - name: payload
                    util: RandomAString
                    params: [50, 50]
                  - name: created_at
                    util: RandomTimestamp
                    params: [1000000]

        executeRules:
            - workload: THRPT_G15_parallel_worker_scan
              run:
                  - name: THRPT_G15_parallel_worker_scan
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_G15_events WHERE event_type = ?;
                          bindings:
                              - util: OneStringFromArray
                                params: ["purchase", "view", "add_to_cart", "checkout", "purchase_failed", "signup", "login", "logout", "delete_account", "update_profile"]