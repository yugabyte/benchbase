type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_WL_10_COL_BETWEEN;
            - ALTER DATABASE postgres SET enable_seqscan=off;
            - ALTER DATABASE postgres SET enable_bitmapscan=off;
            - CREATE TABLE THRPT_WL_10_COL_BETWEEN (id INT, c1 int, c2 int, payload1 json, payload2 json, payload3 json, payload4 json, data1 text, data2 text, data3 text, data4 text, data5 text, PRIMARY KEY(id asc)) split at values ((33333), (66666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_WL_10_COL_BETWEEN;
            - ALTER DATABASE postgres SET enable_seqscan TO DEFAULT;
            - ALTER DATABASE postgres SET enable_bitmapscan TO DEFAULT;

        loadRules:
            - table: THRPT_WL_10_COL_BETWEEN
              rows: 100000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: payload
                    count: 5
                    util: RandomJson
                    params: [20, 512]
                  - name: data
                    count: 5
                    util: RandomAString
                    params: [10240, 10240]

        executeRules:
            - workload: THRPT_WL_10_COL_BETWEEN
              run:
                  - name: THRPT_WL_10_COL_BETWEEN
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_WL_10_COL_BETWEEN WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 99000]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 1000"