type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # CACHE-BOUND read workload: small dataset fits in shared_buffers. PG variant of T19.
        create:
            - DROP TABLE IF EXISTS THRPT_T19_small;
            - CREATE TABLE THRPT_T19_small(id INT, region_id INT, payload TEXT, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T19_small;

        loadRules:
            - table: THRPT_T19_small
              rows: 10000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000]
                  - name: region_id
                    util: RandomNumber
                    params: [1, 100]
                  - name: payload
                    util: RandomAString
                    params: [1000, 1000]

        executeRules:
            - workload: THRPT_T19_cache_bound_small_dataset
              run:
                  - name: THRPT_T19_cache_bound_small_dataset
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T19_small WHERE id = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 10000]
