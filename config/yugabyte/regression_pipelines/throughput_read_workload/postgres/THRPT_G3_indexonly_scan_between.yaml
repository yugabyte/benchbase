type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G3_sales_orders;
            - CREATE TABLE THRPT_G3_sales_orders(id INT, region_id INT, category_id INT, subcategory_id INT, date_created DATE, status_code INT, priority_level INT, amount INT, quantity INT, PRIMARY KEY(id));
            - CREATE INDEX idx_THRPT_G3_sales_orders_region_category_incl ON THRPT_G3_sales_orders (region_id, category_id, id) INCLUDE (amount, quantity, status_code);
            - CREATE INDEX idx_THRPT_G3_sales_orders_partial ON THRPT_G3_sales_orders (region_id, category_id, date_created, id) WHERE status_code IN (1, 2, 3) and priority_level IN (1, 2, 3);
            - CREATE INDEX idx_THRPT_G3_sales_orders_region_category_incl_asc on THRPT_G3_sales_orders (region_id ASC, category_id ASC, id ASC) INCLUDE (amount, quantity, status_code);

        cleanup:
            - DROP TABLE IF EXISTS THRPT_G3_sales_orders;

        loadRules:
              - table: THRPT_G3_sales_orders
                rows: 1000000
                columns:
                    - name: id
                      util: RandomUniqueIntGen
                      params: [ 1, 1000000 ]
                    - name: region_id
                      util: RandomNumber
                      params: [ 1, 100 ]
                    - name: category_id
                      util: RandomNumber
                      params: [ 1, 50 ]
                    - name: subcategory_id
                      util: RandomNumber
                      params: [ 1, 500 ]
                    - name: date_created
                      util: RandomDateBtwYears
                      params: [2000, 2025]
                    - name: status_code
                      util: RandomNumber
                      params: [ 1, 5 ]
                    - name: priority_level
                      util: RandomNumber
                      params: [ 1, 10 ]
                    - name: amount
                      util: RandomNumber
                      params: [ 1, 100000 ]
                    - name: quantity
                      util: RandomNumber
                      params: [ 1, 100000 ]

        executeRules:

            - workload: THRPT_G3_indexonly_BETWEEN
              run:
                  - name: THRPT_G3_indexonly_BETWEEN
                    weight: 100
                    queries:
                        - query: SELECT id, amount, quantity, status_code FROM THRPT_G3_sales_orders WHERE region_id BETWEEN ? AND ? and category_id = ?;
                          bindings:
                              -   util: RandomNumber
                                  params: [1, 95]
                                  referenceName: region1
                              -   util: ExpressionEval
                                  params:
                                      - "region1 + 1"
                              - util: RandomNumber
                                params: [1, 50]
