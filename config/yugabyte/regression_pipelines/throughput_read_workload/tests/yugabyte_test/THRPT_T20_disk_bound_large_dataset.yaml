type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # DISK-BOUND read workload: large dataset (~10M rows * ~1KB = ~10GB) exceeds
        # the typical block cache on benchmark clusters. Random PK lookups across the
        # full key space hit cold blocks frequently, exposing storage-read latency.
        # Pair with T19 (cache-bound) to quantify the cache-miss penalty.
        # NOTE: load can be heavy; loaderthreads bumped to 4. Consider increasing
        # warmup time on a real run if cluster is cold.
        create:
            - DROP TABLE IF EXISTS THRPT_T20_large;
            - CREATE TABLE THRPT_T20_large(id INT, region_id INT, payload TEXT, PRIMARY KEY(id)) SPLIT INTO 3 TABLETS;

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T20_large;

        loadRules:
            - table: THRPT_T20_large
              rows: 10000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 10000000]
                  - name: region_id
                    util: RandomNumber
                    params: [1, 5000]
                  - name: payload
                    util: RandomAString
                    params: [8000, 8000]

        executeRules:
            - workload: THRPT_T20_disk_bound_large_dataset
              run:
                  - name: THRPT_T20_disk_bound_large_dataset
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T20_large WHERE id = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 10000000]
