type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
targetCPU: 80
toleranceCPU: 5
optimalThreads: true
samplingTime: 180
useThroughputThreshold: true
restingTimeSecs: 360
works:
    work:
        time_secs: 900
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: false
        create:
            - DROP TABLE IF EXISTS THRPT_10_single_inserts;
            - CREATE TABLE THRPT_10_single_inserts (dept_id INT, emp_id INT, name VARCHAR(10), email VARCHAR(20), salary FLOAT, hire_date DATE, department VARCHAR(20), payload TEXT, details TEXT, is_active BOOLEAN, last_login TIMESTAMP, primary key(dept_id asc, emp_id asc)) SPLIT AT VALUES ((4), (7));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_10_single_inserts;

        iterationCleanup:
            - DROP TABLE IF EXISTS THRPT_10_single_inserts;
            - CREATE TABLE THRPT_10_single_inserts (dept_id INT, emp_id INT, name VARCHAR(10), email VARCHAR(20), salary FLOAT, hire_date DATE, department VARCHAR(20), payload TEXT, details TEXT, is_active BOOLEAN, last_login TIMESTAMP, primary key(dept_id asc, emp_id asc)) SPLIT AT VALUES ((4), (7));

        loadRules:
            - table: THRPT_10_single_inserts
              rows: 10000000
              columns:
                  - name: dept_id
                    util: RandomUniqueCyclicIntGen
                    params: [1,9,1]
                  - name: emp_id
                    util: PrimaryIntGenThroughput
                    params: [1, 10000000]
                  - name: name
                    util: RandomAString
                    params: [10, 10]
                  - name: email
                    util: RandomAString
                    params: [20, 20]
                  - name: salary
                    util: RandomFloat
                    params: [1, 100000, 2]
                  - name: hire_date
                    util: RandomDate
                    params: [2000, 2026]
                  - name: department
                    util: RandomAString
                    params: [20, 20]
                  - name: payload
                    util: RandomAString
                    params: [512, 512]
                  - name: details
                    util: RandomAString
                    params: [512, 512]
                  - name: is_active
                    util: RandomBoolean
                  - name: last_login
                    util: RandomTimestamp
                    params: [10000000]

        executeRules:
            - workload: THRPT_single_inserts_10_rows
              run:
                  - name: THRPT_single_inserts_10_rows
                    weight: 100
                    queries:
                        - query: INSERT INTO THRPT_10_single_inserts VALUES (?,?,?,?,?,?,?,?,?,?,?);
                          count: 10
                          bindings:
                              - util: RandomUniqueCyclicIntGen
                                params: [1,9,1]
                              - util: PrimaryIntGenThroughput
                                params: [10000001, 2147483646]
                              - util: RandomAString
                                params: [10, 10]
                              - util: RandomAString
                                params: [20, 20]
                              - util: RandomFloat
                                params: [1, 100000, 2]
                              - util: RandomDate
                                params: [2000, 2026]
                              - util: RandomAString
                                params: [20, 20]
                              - util: RandomAString
                                params: [512, 512]
                              - util: RandomAString
                                params: [512, 512]
                              - util: RandomBoolean
                              - util: RandomTimestamp
                                params: [10000000]
