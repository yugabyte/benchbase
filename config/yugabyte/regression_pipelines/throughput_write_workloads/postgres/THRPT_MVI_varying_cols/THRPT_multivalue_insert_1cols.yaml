type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
targetCPU: 80
toleranceCPU: 5
optimalThreads: true
samplingTime: 180
useThroughputThreshold: true
restingTimeSecs: 360
works:
    work:
        time_secs: 900
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_MVI_1_col;
            - CREATE TABLE THRPT_MVI_1_col (dept_id INT, emp_id INT, payload TEXT, primary key(dept_id, emp_id));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_MVI_1_col;

        loadRules:
            - table: THRPT_MVI_1_col
              rows: 10000000
              columns:
                  - name: dept_id
                    util: RandomUniqueCyclicIntGen
                    params: [1,9,1]
                  - name: emp_id
                    util: PrimaryIntGenThroughput
                    params: [1, 10000000]
                  - name: payload
                    util: RandomAString
                    params: [1000, 1000]

        executeRules:
            - workload: THRPT_multivalue_insert_1cols
              run:
                  - name: THRPT_multivalue_insert_1cols
                    weight: 100
                    queries:
                        - query: INSERT INTO THRPT_MVI_1_col VALUES [(?,?,?)][pattern_count]
                          pattern_count: 10
                          bindings:
                              - util: RandomUniqueCyclicIntGen
                                params: [1,9,1]
                              - util: PrimaryIntGenThroughput
                                params: [10000001, 2147483646]
                              - util: RandomAString
                                params: [1000, 1000]