type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G3_sales_orders;
            - CREATE TABLE THRPT_G3_sales_orders(id INT, region_id INT, category_id INT, subcategory_id INT, date_created DATE, status_code INT, priority_level INT, amount FLOAT, quantity DOUBLE PRECISION, payload JSON, details TEXT, PRIMARY KEY(id));
            - CREATE INDEX idx_THRPT_G3_sales_orders_region_category_incl_asc on THRPT_G3_sales_orders (id ASC, region_id ASC, category_id ASC) INCLUDE (amount, quantity, status_code);

        cleanup:
            - DROP TABLE IF EXISTS THRPT_G3_sales_orders;

        loadRules:
              - table: THRPT_G3_sales_orders
                rows: 10000000
                columns:
                    - name: id
                      util: RandomUniqueIntGen
                      params: [ 1, 10000000 ]
                    - name: region_id
                      util: RandomNumber
                      params: [ 1, 1000 ]
                    - name: category_id
                      util: RandomNumber
                      params: [ 1, 500 ]
                    - name: subcategory_id
                      util: RandomNumber
                      params: [ 1, 5000 ]
                    - name: date_created
                      util: RandomDateBtwYears
                      params: [2000, 2025]
                    - name: status_code
                      util: RandomNumber
                      params: [ 1, 5 ]
                    - name: priority_level
                      util: RandomNumber
                      params: [ 1, 10 ]
                    - name: amount
                      util: RandomFloat
                      params: [ 1, 1000000, 2 ]
                    - name: quantity
                      util: RandomNoWithDecimalPoints
                      params: [ 1, 1000000, 2 ]
                    - name: payload
                      util: RandomJson
                      params: [ 8, 64 ]
                    - name: details
                      util: RandomAString
                      params: [ 512, 512 ]

        executeRules:

            -   workload: THRPT_G3_indexonly_IN
                run:
                    -   name: THRPT_G3_indexonly_IN
                        weight: 100
                        queries:
                            -   query: SELECT id, amount, quantity, status_code FROM THRPT_G3_sales_orders WHERE id IN (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?);
                                bindings:
                                    -   util: RandomNumber
                                        count: 100
                                        params: [ 1, 999990 ]
