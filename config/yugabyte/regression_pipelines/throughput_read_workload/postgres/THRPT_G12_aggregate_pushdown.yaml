type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G12_employees;
            - CREATE TABLE THRPT_G12_employees (emp_id INT, name VARCHAR(10), email VARCHAR(20), salary INT, hire_date DATE, department VARCHAR(20), is_active BOOLEAN, last_login TIMESTAMP, PRIMARY KEY(emp_id));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_G12_employees;

        loadRules:
            - table: THRPT_G12_employees
              rows: 1000000
              columns:
                  - name: emp_id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: name
                    util: RandomAString
                    params: [10, 10]
                  - name: email
                    util: RandomAString
                    params: [20, 20]
                  - name: salary
                    util: RandomNoWithDecimalPoints
                    params: [1, 100000, 2]
                  - name: hire_date
                    util: RandomDateBtwYears
                    params: [2000, 2025]
                  - name: department
                    util: OneStringFromArray
                    params: [['Engineering', 'Sales', 'Marketing', 'Finance', 'IT', 'HR', 'Legal', 'Product']]
                  - name: is_active
                    util: RandomBoolean
                  - name: last_login
                    util: RandomTimestamp
                    params: [10000000]

        executeRules:
            - workload: THRPT_G12_aggregate_pushdown
              run:
                  - name: THRPT_G12_aggregate_pushdown
                    weight: 100
                    queries:
                        - query: select sum(salary) from THRPT_G12_employees where department IN (?,?);
                          bindings:
                              - util: OneStringFromArray
                                count: 2
                                params: [['Engineering', 'Sales','Marketing','Finance','IT','HR','Legal','Product']]
