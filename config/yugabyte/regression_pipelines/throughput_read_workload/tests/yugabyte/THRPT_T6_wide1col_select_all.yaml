type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Wide-table read: 1-column table, single-row PK lookup selecting all 1 columns.
        create:
            - DROP TABLE IF EXISTS THRPT_T6_wide;
            - CREATE TABLE THRPT_T6_wide (id INT, c1 INT, PRIMARY KEY(id ASC)) SPLIT AT VALUES ((33333), (66666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_T6_wide;

        loadRules:
            - table: THRPT_T6_wide
              rows: 100000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: c
                    count: 1
                    util: RandomNumber
                    params: [1, 1000000]

        executeRules:
            - workload: THRPT_T6_wide1col_select_all
              run:
                  - name: THRPT_T6_wide1col_select_all
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_T6_wide WHERE id = ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 100000]
