type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: false
        create:
            - DROP TABLE IF EXISTS THRPT_MVI_10_col;
            - CREATE TABLE THRPT_MVI_10_col (dept_id INT, emp_id INT, payload1 TEXT, payload2 TEXT, payload3 TEXT, payload4 TEXT, payload5 TEXT, payload6 TEXT, payload7 TEXT, payload8 TEXT, payload9 TEXT, payload10 TEXT, PRIMARY KEY(dept_id, emp_id));
        cleanup:
            - DROP TABLE IF EXISTS THRPT_MVI_10_col;

        loadRules:
            - table: THRPT_MVI_10_col
              rows: 1000000
              columns:
                  - name: dept_id
                    util: RandomUniqueCyclicIntGenWithPeriod
                    params: [1,9,1]
                  - name: emp_id
                    util: PrimaryIntGen
                    params: [1, 1000000]
                  - name: payload
                    count: 10
                    util: RandomAString
                    params: [100, 100]

        executeRules:
            - workload: THRPT_MVI_10_col
              run:
                  - name: THRPT_MVI_10_col
                    weight: 100
                    queries:
                        - query: INSERT INTO THRPT_MVI_10_col VALUES [(?,?,?,?,?,?,?,?,?,?,?,?)][pattern_count]
                          pattern_count: 10
                          bindings:
                              - util: RandomUniqueCyclicIntGenWithPeriod
                                params: [1,9,1]
                              - util: PrimaryIntGen
                                params: [1000001, 2147483646]
                              - util: RandomAString
                                count: 10
                                params: [100, 100]