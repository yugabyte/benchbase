type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_WL_SEC_IDX_IN_CLAUSE_1;
            - CREATE TABLE THRPT_WL_SEC_IDX_IN_CLAUSE_1 (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id asc)) split at values ((333333), (666666));
            - CREATE INDEX idx_c2 ON THRPT_WL_SEC_IDX_IN_CLAUSE_1 (c2 asc) split at values ((333333), (666666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_WL_SEC_IDX_IN_CLAUSE_1;

        loadRules:
            - table: THRPT_WL_SEC_IDX_IN_CLAUSE_1
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_WL_SEC_IDX_IN_CLAUSE_1
              run:
                  - name: THRPT_WL_SEC_IDX_IN_CLAUSE_1
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_WL_SEC_IDX_IN_CLAUSE_1 WHERE c2 IN (?);
                          bindings:
                              - util: RandomNumber
                                count: 1
                                params: [1, 1000000]