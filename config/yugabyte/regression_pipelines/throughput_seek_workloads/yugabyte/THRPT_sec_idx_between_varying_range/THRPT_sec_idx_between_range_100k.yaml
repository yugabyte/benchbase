type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_sec_idx_between_range_100k;
            - CREATE TABLE THRPT_sec_idx_between_range_100k (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id asc)) split at values ((333333), (666666));
            - CREATE INDEX idx_c2 ON THRPT_sec_idx_between_range_100k (c2 asc) split at values ((333333), (666666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_sec_idx_between_range_100k;

        loadRules:
            - table: THRPT_sec_idx_between_range_100k
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_sec_idx_between_range_100k
              run:
                  - name: THRPT_sec_idx_between_range_100k
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_sec_idx_between_range_100k WHERE c2 between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 900000]
                                referenceName: c2
                              - util: ExpressionEval
                                params:
                                    - "c2 + 100000"
