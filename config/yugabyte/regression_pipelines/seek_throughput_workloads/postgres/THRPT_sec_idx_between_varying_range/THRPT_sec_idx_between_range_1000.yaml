type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_sec_idx_between_range_1000;
            - ALTER DATABASE postgres SET enable_seqscan=off;
            - ALTER DATABASE postgres SET enable_bitmapscan=off;
            - CREATE TABLE THRPT_sec_idx_between_range_1000 (id INT, c1 int, c2 int, payload text, PRIMARY KEY(id));
            - CREATE INDEX idx_c2 ON THRPT_sec_idx_between_range_1000 (c2);

        cleanup:
            - ALTER DATABASE postgres SET enable_seqscan TO DEFAULT;
            - ALTER DATABASE postgres SET enable_bitmapscan TO DEFAULT;
            - DROP TABLE IF EXISTS THRPT_sec_idx_between_range_1000;

        loadRules:
            - table: THRPT_sec_idx_between_range_1000
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [1024, 1024]
        executeRules:
            - workload: THRPT_sec_idx_between_range_1000
              run:
                  - name: THRPT_sec_idx_between_range_1000
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_sec_idx_between_range_1000 WHERE c2 between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 999000]
                                referenceName: c2
                              - util: ExpressionEval
                                params:
                                    - "c2 + 1000"