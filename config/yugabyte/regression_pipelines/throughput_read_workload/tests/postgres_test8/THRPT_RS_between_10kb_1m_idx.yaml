type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 1
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        # Row-shape scan experiment: single TEXT payload column (~10240 B), 1000000 rows. Same column layout as seq twin (lookup_key unindexed, unused here); idx workload: WHERE id = ? (PK). Scan mode: idx.
        create:
            - DROP TABLE IF EXISTS THRPT_RS_between_10kb_1m_idx;
            - CREATE TABLE THRPT_RS_between_10kb_1m_idx (id INT, lookup_key INT, payload TEXT, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_RS_between_10kb_1m_idx;

        loadRules:
            - table: THRPT_RS_between_10kb_1m_idx
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: lookup_key
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    util: RandomAString
                    params: [10240, 10240]
        executeRules:
            - workload: THRPT_RS_between_10kb_1m_idx
              run:
                  - name: THRPT_RS_between_10kb_1m_idx
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_RS_between_10kb_1m_idx WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 999900]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 100"
