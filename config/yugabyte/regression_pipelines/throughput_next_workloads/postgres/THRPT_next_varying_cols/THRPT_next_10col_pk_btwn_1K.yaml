type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 4
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_between_10_cols;
            - ALTER DATABASE postgres SET enable_seqscan=off;
            - ALTER DATABASE postgres SET enable_bitmapscan=off;
            - CREATE TABLE THRPT_between_10_cols (id INT, c1 int, c2 int, payload1 text, payload2 text, payload3 text, payload4 text, payload5 text, payload6 text, payload7 text, payload8 text, payload9 text, payload10 text, PRIMARY KEY(id));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_between_10_cols;
            - ALTER DATABASE postgres SET enable_seqscan TO DEFAULT;
            - ALTER DATABASE postgres SET enable_bitmapscan TO DEFAULT;

        loadRules:
            - table: THRPT_between_10_cols
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: payload
                    count: 10
                    util: RandomAString
                    params: [100, 100]
        executeRules:
            - workload: THRPT_next_10col_pk_btwn_1K
              run:
                  - name: THRPT_next_10col_pk_btwn_1K
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_between_10_cols WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 999000]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 1000"