type: postgres
driver: org.postgresql.Driver
url: jdbc:postgresql://{{endpoint}}:5432/postgres?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderThreads: 1
terminals: 1
collect_pg_stat_statements: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G2_payments;
            - CREATE TABLE THRPT_G2_payments(payment_id INT, txn_id INT, user_id INT, merchant_id INT, amount FLOAT, status INT, created_at DATE, updated_at TIMESTAMP, payload JSON, details TEXT, PRIMARY KEY(payment_id));
            - CREATE INDEX idx_payments_txn_covering ON THRPT_G2_payments (txn_id) INCLUDE (amount, status, user_id);

        cleanup:
            - DROP TABLE IF EXISTS THRPT_G2_payments;

        loadRules:
            - table: THRPT_G2_payments
              rows: 1000000
              columns:
                  - name: payment_id
                    util: RandomUniqueIntGen
                    params: [1, 1000000]
                  - name: txn_id
                    util: PrimaryIntGen
                    params: [1, 1000000]
                  - name: user_id
                    util: RandomNumber
                    params: [1, 100000]
                  - name: merchant_id
                    util: RandomNumber
                    params: [1, 10000]
                  - name: amount
                    util: RandomFloat
                    params: [1, 100000, 2]
                  - name: status
                    util: RandomNumber
                    params: [1, 5]
                  - name: created_at
                    util: RandomDateBtwYears
                    params: [2000, 2025]
                  - name: updated_at
                    util: RandomTimestamp
                    params: [10000000]
                  - name: payload
                    util: RandomJson
                    params: [8, 64]
                  - name: details
                    util: RandomAString
                    params: [512, 512]

        executeRules:
            - workload: THRPT_G2_index_BETWEEN
              run:
                  - name: THRPT_G2_index_BETWEEN
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_G2_payments WHERE txn_id BETWEEN ? AND ?;
                          bindings:
                              -   util: RandomNumber
                                  params: [1, 999900]
                                  referenceName: txn_id_1
                              -   util: ExpressionEval
                                  params:
                                      - "txn_id_1 + 100"
