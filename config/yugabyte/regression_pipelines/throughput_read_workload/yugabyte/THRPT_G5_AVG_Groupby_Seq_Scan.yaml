type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 1
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_G5_sales_orders;
            - CREATE TABLE THRPT_G5_sales_orders(id INT, region_id INT, category_id INT, subcategory_id INT, date_created DATE, status_code INT, priority_level INT, amount FLOAT, quantity DOUBLE PRECISION, payload JSON, details TEXT, PRIMARY KEY(id ASC)) SPLIT AT VALUES ((333333), (666666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_G5_sales_orders;

        loadRules:
            - table: THRPT_G5_sales_orders
              rows: 1000000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [ 1, 1000000 ]
                  - name: region_id
                    util: RandomNumber
                    params: [ 1, 100 ]
                  - name: category_id
                    util: RandomNumber
                    params: [ 1, 50 ]
                  - name: subcategory_id
                    util: RandomNumber
                    params: [ 1, 500 ]
                  - name: date_created
                    util: RandomDateBtwYears
                    params: [2000, 2025]
                  - name: status_code
                    util: RandomNumber
                    params: [ 1, 5 ]
                  - name: priority_level
                    util: RandomNumber
                    params: [ 1, 10 ]
                  - name: amount
                    util: RandomFloat
                    params: [ 1, 100000, 2 ]
                  - name: quantity
                    util: RandomNoWithDecimalPoints
                    params: [ 1, 100000, 2 ]
                  - name: payload
                    util: RandomJson
                    params: [ 8, 64 ]
                  - name: details
                    util: RandomAString
                    params: [ 512, 512 ]

        executeRules:
            - workload: THRPT_G5_AVG_Groupby_Seq
              run:
                  - name: THRPT_G5_AVG_Groupby_Seq
                    weight: 100
                    queries:
                        - query: SELECT region_id, category_id, subcategory_id, priority_level, AVG(amount) as avg_amount, AVG(quantity) as avg_quantity, COUNT(*) as record_count FROM THRPT_G5_sales_orders WHERE priority_level = ? AND status_code IN (?,?) AND date_created >= '2020-01-01' GROUP BY region_id, category_id, subcategory_id, priority_level;
                          bindings:
                           -   util: RandomNumber
                               params: [ 1, 10 ]
                           -   util: RandomNumber
                               params: [ 1, 4 ]
                               referenceName: status_start
                           -   util: ExpressionEval
                               params:
                                   - "status_start + 1"