type: YUGABYTE
driver: com.yugabyte.Driver
url: jdbc:yugabytedb://{{endpoint}}:5433/yugabyte?sslmode=require&ApplicationName=featurebench&reWriteBatchedInserts=true&load-balance=true
username: {{username}}
password: {{password}}
batchsize: 128
isolation: TRANSACTION_REPEATABLE_READ
loaderthreads: 4
terminals: 1
collect_pg_stat_statements: true
use_dist_in_explain: true
yaml_version: v1.0
works:
    work:
        time_secs: 180
        active_terminals: 1
        rate: unlimited
        warmup: 60
microbenchmark:
    class: com.oltpbenchmark.benchmarks.featurebench.customworkload.YBDefaultMicroBenchmark
    properties:
        setAutoCommit: true
        create:
            - DROP TABLE IF EXISTS THRPT_WL_100_COL_BETWEEN;
            - ALTER DATABASE postgres SET enable_seqscan=off;
            - ALTER DATABASE postgres SET enable_bitmapscan=off;
            - CREATE TABLE THRPT_WL_100_COL_BETWEEN (id INT, c1 INT, c2 INT, payload1 JSON, payload2 JSON, payload3 JSON, payload4 JSON, payload5 JSON, payload6 JSON, payload7 JSON, payload8 JSON, payload9 JSON, payload10 JSON, payload11 JSON, payload12 JSON, payload13 JSON, payload14 JSON, payload15 JSON, payload16 JSON, payload17 JSON, payload18 JSON, payload19 JSON, payload20 JSON, payload21 JSON, payload22 JSON, payload23 JSON, payload24 JSON, payload25 JSON, payload26 JSON, payload27 JSON, payload28 JSON, payload29 JSON, payload30 JSON, payload31 JSON, payload32 JSON, payload33 JSON, payload34 JSON, payload35 JSON, payload36 JSON, payload37 JSON, payload38 JSON, payload39 JSON, payload40 JSON, payload41 JSON, payload42 JSON, payload43 JSON, payload44 JSON, payload45 JSON, payload46 JSON, payload47 JSON, payload48 JSON, payload49 JSON, payload50 JSON, data1 TEXT, data2 TEXT, data3 TEXT, data4 TEXT, data5 TEXT, data6 TEXT, data7 TEXT, data8 TEXT, data9 TEXT, data10 TEXT, data11 TEXT, data12 TEXT, data13 TEXT, data14 TEXT, data15 TEXT, data16 TEXT, data17 TEXT, data18 TEXT, data19 TEXT, data20 TEXT, data21 TEXT, data22 TEXT, data23 TEXT, data24 TEXT, data25 TEXT, data26 TEXT, data27 TEXT, data28 TEXT, data29 TEXT, data30 TEXT, data31 TEXT, data32 TEXT, data33 TEXT, data34 TEXT, data35 TEXT, data36 TEXT, data37 TEXT, data38 TEXT, data39 TEXT, data40 TEXT, data41 TEXT, data42 TEXT, data43 TEXT, data44 TEXT, data45 TEXT, data46 TEXT, data47 TEXT, data48 TEXT, data49 TEXT, data50 TEXT, PRIMARY KEY(id asc)) split at values ((33333), (66666));

        cleanup:
            - DROP TABLE IF EXISTS THRPT_WL_100_COL_BETWEEN;
            - ALTER DATABASE postgres SET enable_seqscan TO DEFAULT;
            - ALTER DATABASE postgres SET enable_bitmapscan TO DEFAULT;

        loadRules:
            - table: THRPT_WL_100_COL_BETWEEN
              rows: 100000
              columns:
                  - name: id
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: c1
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: c2
                    util: RandomUniqueIntGen
                    params: [1, 100000]
                  - name: payload
                    count: 50
                    util: RandomJson
                    params: [20, 51]
                  - name: data
                    count: 50
                    util: RandomAString
                    params: [1024, 1024]

        executeRules:
            - workload: THRPT_WL_100_COL_BETWEEN
              run:
                  - name: THRPT_WL_100_COL_BETWEEN
                    weight: 100
                    queries:
                        - query: SELECT * FROM THRPT_WL_100_COL_BETWEEN WHERE id between ? and ?;
                          bindings:
                              - util: RandomNumber
                                params: [1, 99000]
                                referenceName: id1
                              - util: ExpressionEval
                                params:
                                    - "id1 + 1000"